name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy
        env:
          EXPO_PUBLIC_ENTRA_TENANT_ID: ${{ secrets.EXPO_PUBLIC_ENTRA_TENANT_ID }}
          EXPO_PUBLIC_ENTRA_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_ENTRA_CLIENT_ID }}
          EXPO_PUBLIC_DATAVERSE_URL: ${{ secrets.EXPO_PUBLIC_DATAVERSE_URL }}
          EXPO_PUBLIC_DATAVERSE_SCOPE: ${{ secrets.EXPO_PUBLIC_DATAVERSE_SCOPE }}
          EXPO_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_MOSS_0080B8F03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
          app_build_command: "npm run build:web"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_MOSS_0080B8F03 }}
          action: "close"
